<svg viewBox="0 0 600 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { fill: #f5f4ed; stroke: #c96442; stroke-width: 2; }
      .result { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      text { font-family: Arial, sans-serif; }
      .title { font-weight: bold; font-size: 13px; }
      .label { font-size: 11px; fill: #666; }
      .arrow { stroke: #c96442; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c96442"/>
    </marker>
  </defs>

  <text x="300" y="25" class="title" text-anchor="middle" font-size="16">Per-Image Data Pipeline</text>

  <!-- Start: Image -->
  <circle cx="300" cy="60" r="20" fill="#c96442"/>
  <text x="300" y="67" class="title" text-anchor="middle" fill="white">Image</text>

  <!-- Arrow -->
  <path d="M 300 80 L 300 110" class="arrow"/>

  <!-- Step 1: Validate & Resize -->
  <rect x="220" y="110" width="160" height="50" rx="4" class="step"/>
  <text x="300" y="132" class="title" text-anchor="middle">Validate &amp; Resize</text>
  <text x="300" y="150" class="label" text-anchor="middle">if &gt;4MB: shrink to 2000px</text>

  <!-- Arrow -->
  <path d="M 300 160 L 300 190" class="arrow"/>

  <!-- Step 2: Classify -->
  <rect x="180" y="190" width="240" height="55" rx="4" class="step"/>
  <text x="300" y="212" class="title" text-anchor="middle">Gemini: Classify</text>
  <text x="300" y="232" class="label" text-anchor="middle">Response: {"category": "cnic"}</text>

  <!-- Arrow -->
  <path d="M 300 245 L 300 275" class="arrow"/>

  <!-- Step 3: Extract Fields -->
  <rect x="140" y="275" width="320" height="65" rx="4" class="step"/>
  <text x="300" y="297" class="title" text-anchor="middle">Gemini: Extract Fields</text>
  <text x="300" y="315" class="label" text-anchor="middle">{"name": "Ali Khan", "cnic_number": "12345-1234567-1",</text>
  <text x="300" y="330" class="label" text-anchor="middle">"date_of_birth": "1990-05-15", ...}</text>

  <!-- Arrow -->
  <path d="M 300 340 L 300 370" class="arrow"/>

  <!-- Step 4: Validate -->
  <rect x="220" y="370" width="160" height="50" rx="4" class="step"/>
  <text x="300" y="392" class="title" text-anchor="middle">Validate &amp; Normalize</text>
  <text x="300" y="410" class="label" text-anchor="middle">snake_case, type checks</text>

  <!-- Arrow -->
  <path d="M 300 420 L 300 450" class="arrow"/>

  <!-- Step 5: Schema Merge -->
  <rect x="200" y="450" width="200" height="50" rx="4" class="step"/>
  <text x="300" y="472" class="title" text-anchor="middle">Schema Merge</text>
  <text x="300" y="490" class="label" text-anchor="middle">Union keys, null-fill</text>

  <!-- Arrows to outputs -->
  <path d="M 200 500 L 120 530" class="arrow"/>
  <path d="M 300 500 L 300 530" class="arrow"/>
  <path d="M 400 500 L 480 530" class="arrow"/>

  <!-- JSON Output -->
  <rect x="40" y="530" width="160" height="50" rx="4" class="result"/>
  <text x="120" y="552" class="title" text-anchor="middle">category.json</text>
  <text x="120" y="570" class="label" text-anchor="middle">Embedded</text>

  <!-- CSV Output -->
  <rect x="220" y="530" width="160" height="50" rx="4" class="result"/>
  <text x="300" y="552" class="title" text-anchor="middle">category.csv</text>
  <text x="300" y="570" class="label" text-anchor="middle">Embedded</text>

  <!-- PDF Output -->
  <rect x="400" y="530" width="160" height="50" rx="4" class="result"/>
  <text x="480" y="552" class="title" text-anchor="middle">category.pdf</text>
  <text x="480" y="570" class="label" text-anchor="middle">Disk + download</text>
</svg>