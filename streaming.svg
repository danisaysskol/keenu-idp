<svg viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .actor { fill: #f5f4ed; stroke: #c96442; stroke-width: 2; }
      .msg-box { fill: #fffbf0; stroke: #d97757; stroke-width: 1; }
      text { font-family: Arial, sans-serif; }
      .title { font-weight: bold; font-size: 13px; }
      .label { font-size: 11px; fill: #555; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .arrow { stroke: #c96442; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .response { stroke: #16a34a; stroke-dasharray: 3,3; marker-end: url(#arrowhead-green); }
      .timeline { stroke: #ddd; stroke-width: 1; stroke-dasharray: 2,4; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c96442"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="400" y="25" class="title" text-anchor="middle" font-size="16">NDJSON Streaming Exchange</text>

  <!-- Actors -->
  <rect x="80" y="50" width="120" height="40" rx="4" class="actor"/>
  <text x="140" y="75" class="title" text-anchor="middle">Browser</text>

  <rect x="600" y="50" width="120" height="40" rx="4" class="actor"/>
  <text x="660" y="75" class="title" text-anchor="middle">FastAPI</text>

  <!-- Timelines -->
  <line x1="140" y1="90" x2="140" y2="630" class="timeline"/>
  <line x1="660" y1="90" x2="660" y2="630" class="timeline"/>

  <!-- Message 1: Upload -->
  <path d="M 140 120 L 660 140" class="arrow"/>
  <text x="400" y="125" class="label" text-anchor="middle" font-weight="bold">1. POST /api/jobs (multipart)</text>

  <!-- Response 1: Initial -->
  <path d="M 660 170 L 140 190" class="response"/>
  <rect x="155" y="200" width="470" height="45" rx="4" class="msg-box"/>
  <text x="400" y="218" class="code" text-anchor="middle">{"status":"processing","processed":0,"total":3,"images":[...]}</text>

  <!-- Response 2: Image 1 processing -->
  <path d="M 660 270 L 140 290" class="response"/>
  <rect x="155" y="300" width="470" height="45" rx="4" class="msg-box"/>
  <text x="400" y="318" class="code" text-anchor="middle">{"status":"processing","images":[{"status":"processing",...}]}</text>

  <!-- Response 3: Image 1 done -->
  <path d="M 660 370 L 140 390" class="response"/>
  <rect x="155" y="400" width="470" height="55" rx="4" class="msg-box"/>
  <text x="400" y="415" class="code" text-anchor="middle">{"status":"processing","processed":1,"total":3,</text>
  <text x="400" y="430" class="code" text-anchor="middle">"images":[{"status":"done","category":"cnic",...}]}</text>

  <!-- Dots for omitted messages -->
  <circle cx="140" cy="490" r="2" fill="#999"/>
  <circle cx="660" cy="490" r="2" fill="#999"/>
  <circle cx="140" cy="510" r="2" fill="#999"/>
  <circle cx="660" cy="510" r="2" fill="#999"/>

  <!-- Final Response: Complete -->
  <path d="M 660 540 L 140 560" class="response"/>
  <rect x="155" y="570" width="470" height="60" rx="4" class="msg-box"/>
  <text x="400" y="585" class="code" text-anchor="middle">{"status":"complete","processed":3,"total":3,</text>
  <text x="400" y="600" class="code" text-anchor="middle">"output_files":[{"filename":"...json","format":"json",</text>
  <text x="400" y="615" class="code" text-anchor="middle">"content":"[{\"name\":\"...\"}]"}]}</text>

  <!-- Legend -->
  <text x="80" y="645" class="label" font-weight="bold">Key:</text>
  <line x1="130" y1="640" x2="160" y2="640" class="arrow"/>
  <text x="175" y="645" class="label">Request</text>

  <line x1="300" y1="640" x2="330" y2="640" class="response"/>
  <text x="345" y="645" class="label">NDJSON Response</text>
</svg>