<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .actor { fill: #f5f4ed; stroke: #c96442; stroke-width: 2; }
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 16px; font-weight: 700; }
      .label { font-size: 12px; fill: #555; }
      .message-arrow { fill: none; stroke: #c96442; stroke-width: 1.5; marker-end: url(#arrowhead); }
      .response-arrow { fill: none; stroke: #16a34a; stroke-width: 1.5; marker-end: url(#arrowhead-green); stroke-dasharray: 3,3; }
      .box { fill: #fffbf0; stroke: #d97757; stroke-width: 1; padding: 8px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c96442"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="450" y="25" class="text title" text-anchor="middle">NDJSON Streaming Exchange</text>

  <!-- Actors -->
  <rect x="80" y="60" width="140" height="50" class="actor" rx="4"/>
  <text x="150" y="90" class="text title" text-anchor="middle">Browser</text>

  <rect x="680" y="60" width="140" height="50" class="actor" rx="4"/>
  <text x="750" y="90" class="text title" text-anchor="middle">FastAPI</text>

  <!-- Timelines -->
  <line x1="150" y1="110" x2="150" y2="680" stroke="#ddd" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="750" y1="110" x2="750" y2="680" stroke="#ddd" stroke-width="1" stroke-dasharray="2,4"/>

  <!-- Message 1: Upload -->
  <path d="M 150 140 L 750 160" class="message-arrow"/>
  <text x="450" y="145" class="label" text-anchor="middle" font-weight="bold">1. POST /api/jobs (multipart)</text>

  <!-- Response 1: Initial state -->
  <path d="M 750 190 L 150 210" class="response-arrow"/>
  <rect x="160" y="220" width="580" height="50" class="box"/>
  <text x="450" y="240" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"status":"processing","processed":0,"total":3,"images":[...</text>
  <text x="450" y="255" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"status":"pending"}]}</text>

  <!-- Processing image 1 -->
  <path d="M 750 290 L 150 310" class="response-arrow"/>
  <rect x="160" y="320" width="580" height="50" class="box"/>
  <text x="450" y="340" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"status":"processing","processed":0,"total":3,"images":[</text>
  <text x="450" y="355" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"status":"processing","filename":"img1.jpg"}]}</text>

  <!-- Image 1 done -->
  <path d="M 750 390 L 150 410" class="response-arrow"/>
  <rect x="160" y="420" width="580" height="65" class="box"/>
  <text x="450" y="438" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"status":"processing","processed":1,"total":3,"images":[</text>
  <text x="450" y="453" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"status":"done","category":"cnic","fields":{...}},</text>
  <text x="450" y="468" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"status":"processing","filename":"img2.jpg"}]}</text>

  <!-- Processing image 2 & 3 -->
  <circle cx="150" cy="510" r="3" fill="#999"/>
  <circle cx="750" cy="510" r="3" fill="#999"/>
  <circle cx="150" cy="530" r="3" fill="#999"/>
  <circle cx="750" cy="530" r="3" fill="#999"/>
  <circle cx="150" cy="550" r="3" fill="#999"/>
  <circle cx="750" cy="550" r="3" fill="#999"/>

  <!-- Final response: Complete -->
  <path d="M 750 590 L 150 610" class="response-arrow"/>
  <rect x="160" y="620" width="580" height="65" class="box"/>
  <text x="450" y="638" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"status":"complete","processed":3,"total":3,"output_files":[</text>
  <text x="450" y="653" class="label" text-anchor="middle" font-family="monospace" font-size="11">{"filename":"20260428_004615_cnic.json","format":"json",</text>
  <text x="450" y="668" class="label" text-anchor="middle" font-family="monospace" font-size="11">"content":"[{\"name\":\"...\",\"cnic_number\":\"...\"}]"}]}</text>

  <!-- Legend -->
  <text x="80" y="710" class="text label" font-weight="bold">Key:</text>
  <line x1="140" y1="705" x2="170" y2="705" stroke="#c96442" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="180" y="710" class="text label">Request/Stream</text>

  <line x1="380" y1="705" x2="410" y2="705" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowhead-green)"/>
  <text x="420" y="710" class="text label">NDJSON Response (one line per update)</text>
</svg>