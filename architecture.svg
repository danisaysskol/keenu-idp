<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #f5f4ed; stroke: #c96442; stroke-width: 2; }
      .header { fill: #c96442; color: white; }
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
      .title { font-weight: 700; font-size: 16px; }
      .arrow { fill: none; stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-size: 12px; fill: #555; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Frontend Box -->
  <rect x="20" y="20" width="300" height="460" class="box" rx="8"/>
  <rect x="20" y="20" width="300" height="40" class="header" rx="8"/>
  <text x="170" y="48" class="text title" text-anchor="middle" fill="white">Frontend (React, Vercel)</text>

  <rect x="40" y="80" width="130" height="80" class="box" rx="4"/>
  <text x="105" y="105" class="text title" text-anchor="middle">Sidebar</text>
  <text x="105" y="130" class="label" text-anchor="middle">Sample images</text>
  <text x="105" y="150" class="label" text-anchor="middle">Click/drag</text>

  <rect x="190" y="80" width="130" height="80" class="box" rx="4"/>
  <text x="255" y="105" class="text title" text-anchor="middle">Upload</text>
  <text x="255" y="130" class="label" text-anchor="middle">Drag-drop</text>
  <text x="255" y="150" class="label" text-anchor="middle">Multipart POST</text>

  <rect x="40" y="190" width="280" height="100" class="box" rx="4"/>
  <text x="180" y="215" class="text title" text-anchor="middle">Processing Status</text>
  <text x="180" y="240" class="label" text-anchor="middle">Live per-image cards</text>
  <text x="180" y="260" class="label" text-anchor="middle">Progress bar, spinner</text>

  <rect x="40" y="320" width="280" height="140" class="box" rx="4"/>
  <text x="180" y="345" class="text title" text-anchor="middle">Output Panel</text>
  <text x="180" y="370" class="label" text-anchor="middle">Results grid by category</text>
  <text x="180" y="390" class="label" text-anchor="middle">JSON · CSV · PDF</text>
  <text x="180" y="410" class="label" text-anchor="middle">View (modal) / Download</text>

  <!-- Arrow to backend -->
  <path d="M 320 200 L 420 250" class="arrow"/>
  <text x="360" y="220" class="label">POST /api/jobs</text>
  <text x="360" y="240" class="label">multipart stream</text>

  <!-- Backend Box -->
  <rect x="420" y="20" width="560" height="460" class="box" rx="8"/>
  <rect x="420" y="20" width="560" height="40" class="header" rx="8"/>
  <text x="700" y="48" class="text title" text-anchor="middle" fill="white">Backend (FastAPI, Heroku)</text>

  <rect x="440" y="80" width="200" height="340" class="box" rx="4"/>
  <text x="540" y="105" class="text title" text-anchor="middle">process_job_stream</text>
  <text x="540" y="130" class="label" text-anchor="middle">Async generator</text>
  <text x="540" y="155" class="label" text-anchor="middle">For each image:</text>
  <text x="540" y="175" class="label" text-anchor="middle">1. Classify</text>
  <text x="540" y="195" class="label" text-anchor="middle">2. Extract fields</text>
  <text x="540" y="215" class="label" text-anchor="middle">3. Validate</text>
  <text x="540" y="235" class="label" text-anchor="middle">Yield JSON state</text>
  <text x="540" y="260" class="label" text-anchor="middle">Schema merge</text>
  <text x="540" y="280" class="label" text-anchor="middle">Generate outputs:</text>
  <text x="540" y="300" class="label" text-anchor="middle">• JSON (embed)</text>
  <text x="540" y="320" class="label" text-anchor="middle">• CSV (embed)</text>
  <text x="540" y="340" class="label" text-anchor="middle">• PDF (disk)</text>

  <!-- Arrow to Gemini -->
  <path d="M 640 120 L 720 120" class="arrow"/>
  <text x="680" y="110" class="label">Image bytes</text>

  <rect x="720" y="80" width="240" height="340" class="box" rx="4"/>
  <text x="840" y="105" class="text title" text-anchor="middle">Google Gemini API</text>
  <text x="840" y="130" class="label" text-anchor="middle">gemini-3.1-flash-lite</text>
  <text x="840" y="160" class="label" text-anchor="middle">Multimodal:</text>
  <text x="840" y="180" class="label" text-anchor="middle">• Image + text prompt</text>
  <text x="840" y="200" class="label" text-anchor="middle">• JSON response</text>
  <text x="840" y="230" class="label" text-anchor="middle">Classify document</text>
  <text x="840" y="250" class="label" text-anchor="middle">category ∈</text>
  <text x="840" y="270" class="label" text-anchor="middle">{cnic, licence,</text>
  <text x="840" y="290" class="label" text-anchor="middle">invoice, receipt,</text>
  <text x="840" y="310" class="label" text-anchor="middle">resume, form, other}</text>

  <!-- NDJSON stream back -->
  <path d="M 420 300 L 320 300" class="arrow"/>
  <text x="360" y="290" class="label">NDJSON stream</text>
  <text x="360" y="310" class="label">1 JSON line per update</text>

  <!-- Public note -->
  <rect x="20" y="500" width="960" height="50" fill="none" stroke="#d97757" stroke-width="2" stroke-dasharray="5,5" rx="4"/>
  <text x="50" y="530" class="text" font-weight="bold" fill="#d97757">🌍 PUBLIC & ACCESSIBLE EVERYWHERE</text>
</svg>