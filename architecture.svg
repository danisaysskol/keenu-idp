<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      rect { fill: #f5f4ed; stroke: #c96442; stroke-width: 2; }
      .header { fill: #c96442; }
      text { font-family: Arial, sans-serif; }
      .title { font-weight: bold; font-size: 14px; }
      .label { font-size: 12px; fill: #555; }
      .white { fill: white; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Frontend -->
  <rect x="20" y="20" width="280" height="360" rx="8"/>
  <rect x="20" y="20" width="280" height="35" rx="8" class="header"/>
  <text x="160" y="42" class="title white" text-anchor="middle">Frontend (React, Vercel)</text>

  <rect x="40" y="70" width="240" height="65" rx="4"/>
  <text x="160" y="95" class="title" text-anchor="middle">FileUploader</text>
  <text x="160" y="115" class="label" text-anchor="middle">Drag-drop, select files</text>

  <rect x="40" y="150" width="240" height="65" rx="4"/>
  <text x="160" y="175" class="title" text-anchor="middle">ProcessingStatus</text>
  <text x="160" y="195" class="label" text-anchor="middle">Live per-image progress</text>

  <rect x="40" y="230" width="240" height="120" rx="4"/>
  <text x="160" y="255" class="title" text-anchor="middle">OutputPanel</text>
  <text x="160" y="275" class="label" text-anchor="middle">Results by category</text>
  <text x="160" y="290" class="label" text-anchor="middle">JSON · CSV · PDF</text>
  <text x="160" y="305" class="label" text-anchor="middle">View / Download</text>

  <!-- Arrow to Backend -->
  <path d="M 300 120 L 380 120" class="arrow"/>
  <text x="340" y="110" class="label" text-anchor="middle">POST /api/jobs</text>

  <!-- Backend -->
  <rect x="380" y="20" width="280" height="360" rx="8"/>
  <rect x="380" y="20" width="280" height="35" rx="8" class="header"/>
  <text x="520" y="42" class="title white" text-anchor="middle">Backend (FastAPI, Heroku)</text>

  <rect x="400" y="70" width="240" height="300" rx="4"/>
  <text x="520" y="95" class="title" text-anchor="middle">process_job_stream</text>
  <text x="520" y="115" class="label" text-anchor="middle">Async generator</text>

  <text x="520" y="140" class="label" text-anchor="middle">For each image:</text>
  <text x="520" y="158" class="label" text-anchor="middle">1. Classify (Gemini)</text>
  <text x="520" y="175" class="label" text-anchor="middle">2. Extract fields (Gemini)</text>
  <text x="520" y="192" class="label" text-anchor="middle">3. Validate</text>
  <text x="520" y="209" class="label" text-anchor="middle">4. Yield JSON state</text>

  <text x="520" y="240" class="label" text-anchor="middle">Schema merge</text>
  <text x="520" y="257" class="label" text-anchor="middle">Generate outputs:</text>
  <text x="520" y="274" class="label" text-anchor="middle">• JSON (embed)</text>
  <text x="520" y="291" class="label" text-anchor="middle">• CSV (embed)</text>
  <text x="520" y="308" class="label" text-anchor="middle">• PDF (disk)</text>

  <!-- Arrow to Gemini -->
  <path d="M 640 120 L 720 120" class="arrow"/>
  <text x="680" y="110" class="label" text-anchor="middle">Image + prompt</text>

  <!-- Gemini -->
  <rect x="720" y="20" width="260" height="360" rx="8"/>
  <rect x="720" y="20" width="260" height="35" rx="8" class="header"/>
  <text x="850" y="42" class="title white" text-anchor="middle">Google Gemini API</text>

  <rect x="740" y="70" width="220" height="310" rx="4"/>
  <text x="850" y="95" class="title" text-anchor="middle">gemini-3.1-flash-lite</text>
  <text x="850" y="115" class="label" text-anchor="middle">Multimodal AI</text>

  <text x="850" y="145" class="label" text-anchor="middle">Capabilities:</text>
  <text x="850" y="162" class="label" text-anchor="middle">• Image + text understanding</text>
  <text x="850" y="179" class="label" text-anchor="middle">• Classification</text>
  <text x="850" y="196" class="label" text-anchor="middle">• Data extraction</text>
  <text x="850" y="213" class="label" text-anchor="middle">• JSON output</text>

  <text x="850" y="245" class="label" text-anchor="middle">Categories:</text>
  <text x="850" y="262" class="label" text-anchor="middle">CNIC, Licence,</text>
  <text x="850" y="279" class="label" text-anchor="middle">Invoice, Receipt,</text>
  <text x="850" y="296" class="label" text-anchor="middle">Resume, Form, Other</text>

  <!-- NDJSON stream back -->
  <path d="M 640 280 L 300 280" class="arrow"/>
  <text x="470" y="270" class="label" text-anchor="middle">NDJSON stream</text>
  <text x="470" y="290" class="label" text-anchor="middle">(one line per update)</text>
</svg>